[build]
builder = "nixpacks"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 3

# Socket.io requires sticky sessions for multi-instance deployments.
# Railway: set replicas to 1 OR enable sticky sessions in the Railway dashboard
# under Settings → Networking → Session Affinity.
#
# Required environment variables (set in Railway dashboard):
#   PORT                   (Railway sets this automatically)
#   DATABASE_URL           (from Railway PostgreSQL plugin)
#   REDIS_URL              (from Railway Redis plugin)
#   SOMNIA_RPC_URL         = https://dream-rpc.somnia.network
#   CHAIN_ID               = 50312
#   JWT_SECRET             (generate: openssl rand -hex 32)
#   CONTRACT_SCORE_REGISTRY = 0x90ab2482E83BE7A1Ae550b8C789bc6701267adA0
#   CONTRACT_MARKET_ADAPTER = 0x3728Df6fF0cCcEeFd6E98c88beeCfc308Af4F1E4
#   CONTRACT_SEASON_MANAGER = 0x2720aE609232892118aDC314f44679dB13F50267
#   CONTRACT_MOCK_MARKET    = 0xA278c23F935980d903E8Da3d25379b2B5Ec3D16a
#   ETH_MAINNET_RPC        = https://eth.llamarpc.com
#   PINATA_API_KEY         (optional, for SBT IPFS uploads)
#   PINATA_SECRET_API_KEY  (optional)
